services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: myfamilyexpenses
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/myfamilyexpenses?schema=public
      SESSION_COOKIE_NAME: mfe_session
      SESSION_SECRET: replace-this-before-production
      SESSION_TTL_DAYS: "7"
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: "10"
      OCR_PROVIDER: mock
      SEED_USER_PASSWORD: change-me-before-seeding
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - uploads-data:/app/uploads

volumes:
  postgres-data:
  uploads-data:
